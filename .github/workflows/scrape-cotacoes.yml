name: Scrape Cotações Diárias

on:
  schedule:
    # Executa todos os dias úteis às 8:00 AM (UTC-3 = 11:00 AM UTC)
    - cron: '0 11 * * 1-5'
  
  # Permite execução manual
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber
      
      - name: Run scraper scripts
        run: |
          cd scripts
          python3 main_scraper.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Atualização automática de cotações - $(date '+%d/%m/%Y %H:%M')"
            git push
          else
            echo "Nenhuma alteração nos dados"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
