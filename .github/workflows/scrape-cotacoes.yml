name: Scrape Cotações Diárias

on:
  schedule:
    # Executa todos os dias úteis às 8:00 AM (UTC-3 = 11:00 AM UTC)
    - cron: '0 11 * * 1-5'
  
  # Permite execução manual
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pdfplumber
      
      - name: Run scrapers
        run: |
          cd scripts
          python3 main_scraper.py
      
      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -n "$(git status --porcelain client/public/data/)" ]; then
            git add client/public/data/
            git commit -m "Cotações atualizadas - $(date '+%d/%m/%Y %H:%M UTC')"
            git push
          else
            echo "Nenhuma alteração nos dados de cotações"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
